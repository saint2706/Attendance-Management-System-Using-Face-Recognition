---
name: Frontend CI

"on":
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  frontend-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-frontend-env
        with:
          node-version: "20"
          working-directory: frontend

      - name: Prepare log directory
        run: mkdir -p .ci-logs

      - name: Lint
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee .ci-logs/lint.log

      - name: Upload lint logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-logs-20
          path: frontend/.ci-logs/*.log
          if-no-files-found: ignore

  frontend-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [18, 20]

    defaults:
      run:
        working-directory: frontend
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-frontend-env
        with:
          node-version: ${{ matrix.node-version }}
          working-directory: frontend

      - name: Prepare log directory
        run: mkdir -p .ci-logs

      - name: Build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee .ci-logs/build.log

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-logs-${{ matrix.node-version }}
          path: frontend/.ci-logs/*.log
          if-no-files-found: ignore
