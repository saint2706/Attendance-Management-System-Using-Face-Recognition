---
name: Docker Build and Publish

"on":
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - Dockerfile
      - Dockerfile.gpu
      - .dockerignore
      - docker-compose*.yml
      - requirements*.txt
      - pyproject.toml
      - manage.py
      - attendance_system_facial_recognition/**
      - recognition/**
      - users/**
      - src/**
      - scripts/**
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.gpu
      - .dockerignore
      - docker-compose*.yml
      - requirements*.txt
      - pyproject.toml
      - manage.py
      - attendance_system_facial_recognition/**
      - recognition/**
      - users/**
      - src/**
      - scripts/**
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch name with short SHA (e.g., main-abc1234)
            type=raw,value={{branch}}-{{sha}},enable={{is_default_branch}}
            # Semantic versioning from git tags (e.g., v1.2.3 -> 1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            # PR number for pull requests (e.g., pr-123)
            type=ref,event=pr,prefix=pr-
            # Short SHA for all builds
            type=sha,prefix=sha-
          flavor: |
            latest=false

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false
          load: ${{ github.event_name == 'pull_request' }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

      - name: Scan image with Trivy
        if: github.event_name != 'pull_request'
        id: trivy-scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
          format: sarif
          output: trivy-report.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy scan report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: trivy-image-scan
          path: trivy-report.sarif

      - name: Generate SBOM (CycloneDX)
        if: github.event_name != 'pull_request'
        id: trivy-sbom
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
          format: cyclonedx
          output: trivy-sbom.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: image-sbom
          path: trivy-sbom.cdx.json
