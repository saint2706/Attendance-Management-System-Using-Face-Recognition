name: Lighthouse CI

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "attendance_system_facial_recognition/**"
      - "recognition/**"
      - "users/**"
      - "src/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".lighthouserc.js"
      - "recognition/static/**"
      - "recognition/templates/**"
      - "users/templates/**"
      - ".github/workflows/lighthouse.yml"
  pull_request:
    paths:
      - "**.py"
      - "attendance_system_facial_recognition/**"
      - "recognition/**"
      - "users/**"
      - "src/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".lighthouserc.js"
      - "recognition/static/**"
      - "recognition/templates/**"
      - "users/templates/**"
      - ".github/workflows/lighthouse.yml"

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: ams
          POSTGRES_PASSWORD: ams
          POSTGRES_DB: ams
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ams -d ams"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "temporary-secret-key"
      DATA_ENCRYPTION_KEY: "ZHVtbXktZW5jcnlwdGlvbi1rZXktZm9yLWJ1aWxkISE="
      FACE_DATA_ENCRYPTION_KEY: "ZHVtbXktZW5jcnlwdGlvbi1rZXktZm9yLWJ1aWxkISE="
      RECOGNITION_HEADLESS: "True"
      DATABASE_URL: "postgresql://ams:ams@localhost:5432/ams"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          requirements-file: requirements.txt
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Apply database migrations
        run: python manage.py migrate --noinput

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          # Cache based on the OS and a hash of this workflow file since lhci version is hardcoded below
          key: ${{ runner.os }}-npm-lhci-${{ hashFiles('.github/workflows/lighthouse.yml') }}
          # Fallback prefix to restore the latest cache if an exact match isn't found
          restore-keys: |
            ${{ runner.os }}-npm-lhci-

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.0

      - name: Run Lighthouse audits
        run: lhci autorun
