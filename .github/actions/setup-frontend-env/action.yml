---
name: "Setup Frontend Environment"
description: "Sets up Node.js, pnpm, and installs dependencies with caching"
inputs:
  node-version:
    description: "The Node.js version to set up"
    required: true
    default: "20"
  pnpm-version:
    description: "The pnpm version to set up"
    required: true
    default: "10"
  working-directory:
    description: "Directory containing the frontend code"
    required: false
    default: "frontend"
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
