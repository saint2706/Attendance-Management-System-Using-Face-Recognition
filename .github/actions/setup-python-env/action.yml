---
name: "Setup Python Environment"
description: "Sets up Python, system dependencies, and Python dependencies"
inputs:
  python-version:
    description: "The Python version to set up"
    required: true
    default: "3.12"
  requirements-file:
    description: "The requirements file to install"
    required: true
    default: "requirements.txt"
  cache-dependency-path:
    description: "Path to dependency files for caching"
    required: false
    default: "requirements*.txt\npyproject.toml"
runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r ${{ inputs.requirements-file }}
