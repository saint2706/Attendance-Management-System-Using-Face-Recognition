# SealedSecret template for sensitive configuration
# IMPORTANT: In production, generate this using kubeseal
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: attendance-secrets
  namespace: attendance-system
  labels:
    app.kubernetes.io/name: attendance-system
spec:
  encryptedData:
    # These would be encrypted using kubeseal.
    # Using dummy encrypted strings to show structure.
    DJANGO_SECRET_KEY: "AgBD..."
    DATA_ENCRYPTION_KEY: "AgBD..."
    FACE_DATA_ENCRYPTION_KEY: "AgBD..."
    DB_USER: "AgBD..."
    DB_PASSWORD: "AgBD..."
    POSTGRES_PASSWORD: "AgBD..."
  template:
    metadata:
      name: attendance-secrets
      labels:
        app.kubernetes.io/name: attendance-system
    type: Opaque
